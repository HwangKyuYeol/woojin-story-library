<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>우진이의 기차여행</title><link rel="stylesheet" href="../../../css/main.css"></head><body><header class="topbar"><a href="../../../index.html">← 도서관</a><strong>🚂 우진이의 기차여행</strong><span id="counter" class="counter">1 / 6</span></header><button class="tap-zone left" aria-label="이전"></button><button class="tap-zone right" aria-label="다음"></button><main class="reader"><section class="stage">
<div class="page active"><img src="pages/01.jpg" alt="표지"><div class="story-text">우진이의\n기차 여행이\n시작돼요.</div></div>
<div class="page"><img src="pages/02.jpg" alt="봄"><div class="story-text">봄바람이\n살랑살랑.\n기차는 꽃길을\n달려갔어요.</div></div>
<div class="page"><img src="pages/03.jpg" alt="여름"><div class="story-text">파란 바다를\n따라 달리며\n우진이는 환하게\n웃었어요.</div></div>
<div class="page"><img src="pages/04.jpg" alt="가을"><div class="story-text">단풍잎이\n하나 둘 날리자\n기차도 천천히\n가을을 지나갔어요.</div></div>
<div class="page"><img src="pages/05.jpg" alt="겨울"><div class="story-text">하얀 눈이\n소복소복.\n우진이는 눈사람에게\n손을 흔들었어요.</div></div>
<div class="page"><img src="pages/06.jpg" alt="터널"><div class="story-text">터널을 지나면\n반짝이는 바다.\n다음 여행도\n함께 떠나요.</div></div>
