<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>우진이 성장 도서관</title>
<style>
:root{--bg1:#fff6de;--bg2:#f5c277;--ink:#382313;--accent:#ff7246;--green:#278c6c;--shadow:0 22px 60px rgba(65,38,14,.25)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--ink);background:linear-gradient(150deg,#fff8e4,#f6d498 42%,#f2ad6c);overflow-x:hidden}button{font-family:inherit}.hidden{display:none!important}
body:before,body:after{content:"";position:fixed;border-radius:999px;background:rgba(255,255,255,.28);filter:blur(7px);pointer-events:none;z-index:0}body:before{width:60vw;height:18vw;left:-20vw;top:13%;animation:cloud 38s linear infinite}body:after{width:45vw;height:14vw;right:-10vw;bottom:8%;animation:cloud2 46s linear infinite}@keyframes cloud{to{transform:translateX(135vw)}}@keyframes cloud2{to{transform:translateX(-130vw)}}
.app{position:relative;z-index:1;min-height:100dvh;padding:24px max(16px,env(safe-area-inset-left)) max(24px,env(safe-area-inset-bottom))}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;max-width:1180px;margin:0 auto 18px}.brand h1{margin:0;font-size:clamp(30px,5vw,58px);letter-spacing:-.06em;line-height:1.05}.brand p{margin:8px 0 0;opacity:.78;font-weight:800}.stats{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.stat,.pill{border:0;border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.7);box-shadow:0 8px 22px rgba(0,0,0,.1);font-weight:900;color:#513018}.shelf{max-width:1180px;margin:0 auto;padding:28px;border-radius:32px;background:linear-gradient(#9b5a2e,#74401f);box-shadow:var(--shadow),inset 0 -14px 0 rgba(0,0,0,.17)}.books{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:22px}.book-card{position:relative;min-height:300px;border:0;background:transparent;text-align:left;cursor:pointer;perspective:1000px}.book-cover{height:100%;min-height:300px;border-radius:20px;background:#fff8e9;overflow:hidden;box-shadow:0 18px 32px rgba(0,0,0,.25),inset 13px 0 16px rgba(0,0,0,.12);transition:.42s cubic-bezier(.2,.9,.2,1);transform-origin:left center}.book-card:hover .book-cover,.book-card.opening .book-cover{transform:translateY(-14px) rotateY(-13deg) rotateZ(-1deg);box-shadow:0 34px 58px rgba(0,0,0,.32)}.book-cover img{width:100%;height:190px;object-fit:cover;display:block}.book-info{padding:16px}.book-info h2{margin:0 0 8px;font-size:24px;letter-spacing:-.05em}.book-info p{margin:0;line-height:1.45;font-size:14px;opacity:.75}.status,.stamp{position:absolute;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:1000}.status{right:12px;top:12px;background:rgba(255,255,255,.9)}.stamp{left:12px;top:12px;background:#ffef7c;color:#8a4b00;border:2px solid rgba(151,80,0,.25);transform:rotate(-8deg)}.coming{opacity:.68;filter:saturate(.55)}.footer-note{max-width:1180px;margin:18px auto 0;text-align:center;font-weight:900;color:rgba(55,33,16,.72)}
.reader{position:fixed;inset:0;z-index:10;background:radial-gradient(circle at top,#fffbec,#f2c37c);display:flex;flex-direction:column;padding:calc(12px + env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));overflow:hidden}.reader-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 auto 10px;width:min(1260px,100%);z-index:5}.reader-title{font-size:clamp(18px,3vw,28px);font-weight:1000;letter-spacing:-.04em}.reader-actions{display:flex;gap:8px}.navbtn{border:0;border-radius:999px;padding:11px 15px;background:rgba(255,255,255,.75);font-weight:900;color:#4a2b16;box-shadow:0 8px 20px rgba(0,0,0,.12)}.book-stage{position:relative;flex:1;display:grid;place-items:center;width:min(1260px,100%);margin:0 auto;min-height:0}.page-card{position:relative;width:min(100%,calc((100dvh - 120px) * 1.56));height:min(calc(100dvh - 120px),calc(100vw / 1.56));border-radius:28px;overflow:hidden;background:#fff8e9;box-shadow:0 25px 70px rgba(63,35,12,.34);transform-style:preserve-3d;cursor:pointer}.page-card.flip-next{animation:flipNext .48s ease both}.page-card.flip-prev{animation:flipPrev .48s ease both}@keyframes flipNext{50%{transform:perspective(1200px) rotateY(-11deg) translateX(-18px);opacity:.76}}@keyframes flipPrev{50%{transform:perspective(1200px) rotateY(11deg) translateX(18px);opacity:.76}}.page-card img{width:100%;height:100%;object-fit:contain;display:block;background:linear-gradient(135deg,#fff6da,#f6d499)}.story-text{position:absolute;left:6%;bottom:6%;max-width:50%;font-family:"Apple SD Gothic Neo","Noto Serif KR",serif;font-size:clamp(20px,3.2vw,38px);font-weight:1000;line-height:1.25;letter-spacing:-.045em;color:#fff;text-shadow:0 3px 8px rgba(0,0,0,.58),0 0 22px rgba(0,0,0,.28);white-space:pre-line}.reader-bottom{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px}.bigbtn{border:0;border-radius:18px;padding:13px 24px;background:#3d2b1d;color:#fff;font-weight:1000;box-shadow:0 10px 24px rgba(0,0,0,.2)}.bigbtn.primary{background:linear-gradient(135deg,#ff7d42,#f04462)}.bigbtn:disabled{opacity:.38}.page-indicator{display:flex;justify-content:center;gap:8px;margin:10px auto 0}.dot{width:9px;height:9px;border-radius:99px;background:rgba(90,51,20,.24)}.dot.active{width:28px;background:var(--accent)}
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}.particle{position:absolute;top:-40px;font-size:24px;animation:fall linear forwards;opacity:.82}@keyframes fall{to{transform:translateY(110dvh) rotate(260deg);opacity:.16}}.train-intro{position:fixed;inset:0;z-index:60;background:linear-gradient(#bfe8ff 0%,#fff1c7 55%,#d9b574 56%);display:grid;place-items:center;overflow:hidden}.train-intro.hidden{display:none!important}.window-scene{position:absolute;inset:0;overflow:hidden}.track{position:absolute;left:0;right:0;bottom:28%;height:8px;background:#6d4322;box-shadow:0 16px 0 #6d4322}.mountains{position:absolute;left:0;bottom:38%;width:200%;height:24%;background:linear-gradient(135deg,transparent 40%,#7cbf80 41% 60%,transparent 61%);animation:scroll 9s linear infinite}.trees{position:absolute;left:0;bottom:30%;width:200%;height:18%;background:repeating-linear-gradient(90deg,transparent 0 46px,#3d9355 47px 62px,transparent 63px 104px);animation:scroll 5s linear infinite}.sea{position:absolute;left:0;right:0;bottom:0;height:28%;background:repeating-linear-gradient(180deg,#74cbed 0 14px,#4db5e2 15px 25px)}@keyframes scroll{to{transform:translateX(-50%)}}.train-box{position:relative;text-align:center;z-index:2}.train{font-size:88px;animation:trainMove 2.1s ease-in-out forwards}.smoke{font-size:34px;animation:smoke 1.1s infinite}.train-box h2{font-size:clamp(28px,6vw,58px);margin:0;color:#314d74;text-shadow:0 3px 0 rgba(255,255,255,.75)}@keyframes trainMove{0%{transform:translateX(-80vw)}70%{transform:translateX(0)}100%{transform:translateX(110vw)}}@keyframes smoke{50%{transform:translateY(-12px);opacity:.35}}
.choice-panel,.memory-panel,.modal{position:fixed;inset:0;z-index:80;background:rgba(44,25,13,.42);display:grid;place-items:center;padding:22px}.choice-card,.memory-card,.modal-card{background:#fff7dc;border-radius:28px;padding:26px;text-align:center;max-width:920px;width:min(100%,920px);box-shadow:var(--shadow)}.choice-card h2,.modal-card h2{margin:0 0 10px;font-size:clamp(28px,5vw,46px)}.choice-card p,.modal-card p{font-weight:900;margin:0 0 18px}.choice-buttons{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}.choice-buttons button,.modal-card button,.memory-card button{border:0;border-radius:999px;padding:14px 22px;background:#2f8f6b;color:#fff;font-weight:1000;box-shadow:0 10px 24px rgba(0,0,0,.16)}.choice-buttons button:nth-child(2){background:#2f6fc7}.hidden-object{position:absolute;border:0;background:transparent;font-size:34px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.3));animation:pulse 1.4s ease-in-out infinite;z-index:6}.hidden-object.found{animation:none;transform:scale(1.4);opacity:.4}@keyframes pulse{50%{transform:scale(1.18)}}.find-counter{position:absolute;right:16px;bottom:16px;z-index:7;background:rgba(255,255,255,.82);border-radius:999px;padding:8px 12px;font-weight:1000;box-shadow:0 8px 18px rgba(0,0,0,.12)}.memory-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0}.memory-item{background:#fff;border-radius:20px;padding:10px;box-shadow:0 10px 24px rgba(0,0,0,.13)}.memory-item img{width:100%;height:260px;object-fit:cover;border-radius:16px}.memory-item strong{display:block;margin-top:8px}.memory-card h2{font-size:clamp(27px,5vw,44px);margin:0 0 6px}.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:100;background:#2e2117;color:#fff;border-radius:999px;padding:12px 18px;font-weight:1000;box-shadow:0 12px 28px rgba(0,0,0,.25)}
@media(max-width:720px){.topbar{align-items:flex-start;flex-direction:column}.shelf{padding:18px;border-radius:22px}.books{grid-template-columns:1fr 1fr;gap:12px}.book-card{min-height:220px}.book-cover{min-height:220px}.book-cover img{height:125px}.book-info{padding:11px}.book-info h2{font-size:18px}.book-info p{font-size:12px}.page-card{width:100%;height:calc(100dvh - 150px);border-radius:18px}.story-text{max-width:76%;font-size:clamp(20px,7vw,32px)}.memory-grid{grid-template-columns:1fr}.memory-item img{height:210px}.train{font-size:70px}.bigbtn{padding:12px 16px}}
</style>
</head>
<body>
<div id="library" class="app">
  <div class="topbar"><div class="brand"><h1>📚 우진이 성장 도서관</h1><p>읽고, 찾고, 선택하고, 추억을 다시 보는 디지털 동화책</p></div><div class="stats"><div class="stat" id="readStat">읽은 책 0권</div><button class="pill" id="resetBtn">스탬프 초기화</button></div></div>
  <section class="shelf"><div class="books" id="books"></div></section>
  <p class="footer-note">책을 누르면 열리고, 책 화면을 터치하면 다음 페이지로 넘어가요.</p>
</div>
<div id="reader" class="reader hidden">
  <div class="reader-top"><button class="navbtn" id="backBtn">← 도서관으로</button><div class="reader-title" id="readerTitle"></div><div class="reader-actions"><button class="navbtn" id="soundBtn">🔇 소리 OFF</button></div></div>
  <div class="book-stage"><div class="particles" id="particles"></div><div class="page-card" id="pageCard"><img id="pageImg" alt="동화 페이지"><div id="storyText" class="story-text"></div><button id="hiddenObject" class="hidden-object hidden" type="button">⭐</button><div id="findCounter" class="find-counter hidden">숨은그림 0/3</div></div></div>
  <div class="page-indicator" id="dots"></div><div class="reader-bottom"><button class="bigbtn" id="prevBtn">← 이전</button><button class="bigbtn primary" id="nextBtn">다음 →</button></div>
</div>
<div id="trainIntro" class="train-intro hidden"><div class="window-scene"><div class="mountains"></div><div class="trees"></div><div class="sea"></div><div class="track"></div></div><div class="train-box"><div class="smoke">☁️ ☁️</div><div class="train">🚂</div><h2>칙칙폭폭, 여행을 시작해요!</h2></div></div>
<div id="choicePanel" class="choice-panel hidden"><div class="choice-card"><h2>🚂 어디로 가볼까?</h2><p>우진이가 다음 여행길을 골라요.</p><div class="choice-buttons"><button data-choice="flower">🌸 꽃길로 가기</button><button data-choice="sea">🌊 바닷길로 가기</button></div></div></div>
<div id="memoryPanel" class="memory-panel hidden"><div class="memory-card"><h2>📷 추억 모드</h2><p>동화 속 장면과 실제 추억을 함께 남겨요.</p><div class="memory-grid" id="memoryGrid"></div><button id="memoryClose">도서관으로 돌아가기</button></div></div>
<div id="finishModal" class="modal hidden"><div class="modal-card"><h2>🎉 이야기가 끝났어요!</h2><p id="finishText">완독 스탬프를 찍었어요.</p><button id="finishBtn">추억 보고 도서관으로</button></div></div>
<div id="toast" class="toast hidden"></div>
<script>
const BOOKS=[
 {id:'train',emoji:'🚂',title:'우진이의 기차여행',subtitle:'선택하며 떠나는 봄·바다·계절 여행',cover:'assets/books/train/cover.jpg',theme:'train',memories:['assets/memories/train/01.jpg'],pages:[
  {img:'assets/books/train/pages/01.jpg',text:'우진이의\n기차여행'},
  {img:'assets/books/train/pages/02.jpg',text:'봄바람이 살랑살랑\n꽃길을 지나가요.',hidden:'🌸'},
  {choice:true},
  {img:'assets/books/train/pages/03.jpg',text:'바닷길을 따라\n파란 물결이 반짝여요.',branch:'sea',hidden:'🐚'},
  {img:'assets/books/train/pages/04.jpg',text:'꽃길을 따라\n노란 햇살이 따라와요.',branch:'flower',hidden:'🦋'},
  {img:'assets/books/train/pages/05.jpg',text:'하얀 눈마을에서\n따뜻하게 웃어요.',hidden:'⭐'},
  {img:'assets/books/train/pages/06.jpg',text:'터널을 지나면\n새로운 여행이 기다려요.'}
 ]},
 {id:'jeju',emoji:'🏝️',title:'우진이의 제주도 여행',subtitle:'숨은그림을 찾으며 보는 노란 꽃길과 파란 바다',cover:'assets/books/jeju-part1/cover.jpg',theme:'jeju',memories:['assets/memories/jeju/01.jpg','assets/memories/jeju/02.jpg','assets/memories/jeju/03.jpg'],pages:[
  {img:'assets/books/jeju-part1/pages/01.jpg',text:'제주도에\n도착했어요.'},
  {img:'assets/books/jeju-part1/pages/02.jpg',text:'노란 꽃길을\n천천히 걸어요.',hidden:'🌼'},
  {img:'assets/books/jeju-part1/pages/03.jpg',text:'꽃향기가\n살랑살랑 다가와요.',hidden:'🦋'},
  {img:'assets/books/jeju-part1/pages/04.jpg',text:'엄마 품은\n언제나 따뜻해요.'},
  {img:'assets/books/jeju-part1/pages/05.jpg',text:'우리 가족이 함께라서\n더 행복했어요.',hidden:'❤️'},
  {img:'assets/books/jeju-part1/pages/06.jpg',text:'우진이는 오늘\n꼬마 해녀가 되었어요.'},
  {img:'assets/books/jeju-part1/pages/07.jpg',text:'파도가 철썩철썩\n인사를 해요.',hidden:'🐚'},
  {img:'assets/books/jeju-part1/pages/08.jpg',text:'바위 뒤에서\n까꿍!'},
  {img:'assets/books/jeju-part1/pages/09.jpg',text:'부릉부릉\n상상 여행을 떠나요.'},
  {img:'assets/books/jeju-part1/pages/10.jpg',text:'아빠가 번쩍!\n하늘 가까이 올라가요.'},
  {img:'assets/books/jeju-part1/pages/11.jpg',text:'오늘도\n행복한 하루였습니다.'}
 ]},
 {id:'jeju2',emoji:'🌊',title:'제주도 여행 Part 2',subtitle:'다음 사진으로 곧 이어질 바다 이야기',cover:'assets/books/jeju-part1/cover.jpg',coming:true},
 {id:'dino',emoji:'🦕',title:'공룡나라 모험',subtitle:'우진이가 공룡 친구를 만나는 이야기',cover:'assets/books/train/cover.jpg',coming:true}
];
let current=null,page=0,soundOn=false,audioCtx=null,choice=null,found={},visiblePages=[];const $=id=>document.getElementById(id);const readKey='woojin.readBooks.interactive.v1';const foundKey='woojin.foundObjects.v1';
function getStore(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch(e){return {}}}function setStore(k,v){localStorage.setItem(k,JSON.stringify(v))}
function renderLibrary(){const read=getStore(readKey);$('books').innerHTML=BOOKS.map(b=>`<button class="book-card ${b.coming?'coming':''}" data-id="${b.id}"><div class="book-cover"><img src="${b.cover}" alt="${b.title}"><div class="book-info"><h2>${b.emoji} ${b.title}</h2><p>${b.subtitle}</p></div></div>${read[b.id]?'<div class="stamp">✅ 완독</div>':''}<div class="status">${b.coming?'준비중':(read[b.id]?'다시 읽기':'읽기')}</div></button>`).join('');$('readStat').textContent=`읽은 책 ${Object.keys(read).length}권`;document.querySelectorAll('.book-card').forEach(btn=>btn.onclick=()=>openBook(btn.dataset.id,btn));}
function buildVisiblePages(){visiblePages=[];for(const p of current.pages){if(p.choice){visiblePages.push(p);continue}if(p.branch && p.branch!==choice)continue;visiblePages.push(p)}}
function openBook(id,btn){const book=BOOKS.find(b=>b.id===id);if(!book||book.coming){alert('아직 준비중인 이야기예요.');return}btn.classList.add('opening');setTimeout(()=>{current=book;page=0;choice=null;found=getStore(foundKey)[book.id]||{};buildVisiblePages();$('readerTitle').textContent=`${book.emoji} ${book.title}`;$('library').classList.add('hidden');$('reader').classList.remove('hidden');if(book.theme==='train')showTrainIntro();showPage('next');startParticles(book.theme)},330)}
function showTrainIntro(){const el=$('trainIntro');el.classList.remove('hidden');beep('train');setTimeout(()=>el.classList.add('hidden'),2200)}
function currentPage(){return visiblePages[page]}function totalHidden(){return current.pages.filter(p=>p.hidden && (!p.branch || p.branch===choice)).length}function foundCount(){return Object.keys(found).filter(k=>found[k]).length}
function showPage(dir){if(!current)return;const p=currentPage();if(p.choice){showChoice();return}const card=$('pageCard');card.classList.remove('flip-next','flip-prev');void card.offsetWidth;card.classList.add(dir==='prev'?'flip-prev':'flip-next');$('pageImg').src=p.img;$('storyText').textContent=(p.text||'').replace(/\\n/g,'\n').replace(/\n/g,'\n');$('prevBtn').disabled=page===0;$('nextBtn').textContent=page===visiblePages.length-1?'끝내기 →':'다음 →';$('dots').innerHTML=visiblePages.map((_,i)=>`<span class="dot ${i===page?'active':''}"></span>`).join('');renderHiddenObject(p);beep('page')}
function renderHiddenObject(p){const h=$('hiddenObject'),c=$('findCounter');if(!current){h.classList.add('hidden');c.classList.add('hidden');return}const total=totalHidden();c.textContent=`숨은그림 ${foundCount()}/${total||0}`;c.classList.toggle('hidden',total===0);if(!p.hidden){h.classList.add('hidden');return}const key=page+'-'+p.hidden;h.textContent=p.hidden;h.className='hidden-object';if(found[key])h.classList.add('found');const pos=[['72%','22%'],['18%','34%'],['78%','62%'],['38%','18%'],['58%','72%']][page%5];h.style.left=pos[0];h.style.top=pos[1];h.onclick=(e)=>{e.stopPropagation();if(!found[key]){found[key]=true;const all=getStore(foundKey);all[current.id]=found;setStore(foundKey,all);toast(`${p.hidden} 찾았다!`);beep('done');renderHiddenObject(p)}}}
function showChoice(){$('choicePanel').classList.remove('hidden');beep('done')}
document.querySelectorAll('#choicePanel button').forEach(b=>b.onclick=()=>{choice=b.dataset.choice;$('choicePanel').classList.add('hidden');buildVisiblePages();page=visiblePages.findIndex(p=>p.branch===choice);if(page<0)page=2;toast(choice==='sea'?'바닷길로 출발!':'꽃길로 출발!');showPage('next')});
function next(){if(!current)return;if(page>=visiblePages.length-1){finishBook();return}page++;showPage('next')}function prev(){if(!current||page===0)return;page--;showPage('prev')}
function finishBook(){const read=getStore(readKey);read[current.id]={done:true,date:new Date().toISOString(),count:(read[current.id]?.count||0)+1};setStore(readKey,read);$('finishText').textContent=`${current.title} 완독 스탬프를 찍었어요.`;$('finishModal').classList.remove('hidden');beep('done')}
function closeReader(){$('reader').classList.add('hidden');$('library').classList.remove('hidden');$('finishModal').classList.add('hidden');$('memoryPanel').classList.add('hidden');current=null;renderLibrary()}
function showMemory(){if(!current){closeReader();return}const grid=$('memoryGrid');const first=visiblePages[0]?.img||current.cover;const mem=(current.memories||[]);grid.innerHTML=`<div class="memory-item"><img src="${first}"><strong>🎨 동화 속 장면</strong></div>`+mem.slice(0,3).map((m,i)=>`<div class="memory-item"><img src="${m}"><strong>📷 실제 추억 ${i+1}</strong></div>`).join('');$('finishModal').classList.add('hidden');$('memoryPanel').classList.remove('hidden')}
function startParticles(theme){const box=$('particles');box.innerHTML='';const icons=theme==='jeju'?['🌼','🦋','🌊','☁️']:['🌸','🍂','❄️','☁️'];clearInterval(window.particleTimer);window.particleTimer=setInterval(()=>{if($('reader').classList.contains('hidden'))return;const s=document.createElement('span');s.className='particle';s.textContent=icons[Math.floor(Math.random()*icons.length)];s.style.left=Math.random()*100+'%';s.style.animationDuration=(5+Math.random()*6)+'s';s.style.fontSize=(18+Math.random()*18)+'px';box.appendChild(s);setTimeout(()=>s.remove(),11000)},520)}
function initAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}function beep(type){if(!soundOn)return;initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);const now=audioCtx.currentTime;if(type==='train'){o.frequency.setValueAtTime(190,now);o.frequency.linearRampToValueAtTime(120,now+.22);g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.35);o.start(now);o.stop(now+.36);return}if(type==='done'){o.frequency.value=660;g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.45);o.start(now);o.stop(now+.45);return}o.frequency.value=360;g.gain.setValueAtTime(.045,now);g.gain.exponentialRampToValueAtTime(.001,now+.12);o.start(now);o.stop(now+.13)}
function toast(t){const el=$('toast');el.textContent=t;el.classList.remove('hidden');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>el.classList.add('hidden'),1400)}
$('nextBtn').onclick=next;$('prevBtn').onclick=prev;$('backBtn').onclick=closeReader;$('finishBtn').onclick=showMemory;$('memoryClose').onclick=closeReader;$('pageCard').onclick=next;$('soundBtn').onclick=()=>{soundOn=!soundOn;if(soundOn)initAudio();$('soundBtn').textContent=soundOn?'🔊 소리 ON':'🔇 소리 OFF';beep('done')};$('resetBtn').onclick=()=>{if(confirm('완독/숨은그림 기록을 초기화할까요?')){localStorage.removeItem(readKey);localStorage.removeItem(foundKey);renderLibrary()}};
let sx=0;$('reader').addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});$('reader').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>55){dx<0?next():prev()}},{passive:true});document.addEventListener('keydown',e=>{if(!$('reader').classList.contains('hidden')){if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key==='Escape')closeReader()}});
renderLibrary();
</script>
</body>
