<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffe9b7" />
  <title>우진이 성장 도서관</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div id="app">
    <section id="library" class="screen active">
      <div class="library-bg"></div>
      <header class="library-header">
        <p class="eyebrow">WooJin Story Library</p>
        <h1>우진이 성장 도서관</h1>
        <p>우진이의 소중한 추억을 한 권씩 모아두는 디지털 동화책</p>
      </header>

      <main class="shelf">
        <article class="book-card ready" data-book="train">
          <div class="book-cover train-cover">
            <img src="assets/books/train/cover.jpg" alt="우진이의 기차 여행 표지" />
          </div>
          <div class="book-info">
            <span class="tag">OPEN</span>
            <h2>우진이의 기차 여행</h2>
            <p>사계절을 지나 행복역까지</p>
          </div>
        </article>

        <article class="book-card ready" data-book="jeju-part1">
          <div class="book-cover" style="--cover:url('../assets/books/jeju-part1/cover.jpg')">
            <img src="assets/books/jeju-part1/cover.jpg" alt="우진이의 제주도 여행 Part 1 표지" />
          </div>
          <div class="book-info">
            <span class="tag">NEW</span>
            <h2>우진이의 제주도 여행</h2>
            <p>PART 1 · 노란 꽃길과 파란 바다</p>
          </div>
        </article>

        <article class="book-card coming">
          <div class="fake-cover sea">🌊</div>
          <div class="book-info">
            <span class="tag muted">다음권</span>
            <h2>제주도 여행 Part 2</h2>
            <p>바다 이야기로 이어집니다</p>
          </div>
        </article>
      </main>
    </section>

    <section id="reader" class="screen">
      <div class="reader-bg"></div>
      <header class="reader-top">
        <button id="backToLibrary" class="ghost-btn">← 도서관으로</button>
        <div>
          <strong id="bookTitle">우진이의 제주도 여행</strong>
          <span id="pageCounter">1 / 11</span>
        </div>
        <button id="soundBtn" class="ghost-btn">소리 켜기</button>
      </header>

      <main class="stage" id="stage">
        <button id="prevPage" class="tap-zone left" aria-label="이전 페이지"></button>
        <div id="book" class="flip-book" aria-live="polite"></div>
        <button id="nextPage" class="tap-zone right" aria-label="다음 페이지"></button>
        <div class="hint">화면을 좌우로 넘기거나 버튼을 눌러보세요</div>
      </main>

      <footer class="reader-controls">
        <button id="prevBtn">← 이전</button>
        <div id="dots" class="dots"></div>
        <button id="nextBtn">다음 →</button>
      </footer>
    </section>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
