<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WooJin Story Library</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f7edda;color:#2f2418}body{overflow:hidden}.screen{display:none;min-height:100dvh}.screen.active{display:block}.hero{padding:clamp(28px,5vw,56px) clamp(20px,6vw,72px) 18px;background:linear-gradient(135deg,#fff7df,#dff3ff 55%,#ffe6b3);border-bottom:1px solid rgba(90,63,27,.12)}.eyebrow{margin:0 0 8px;font-size:13px;font-weight:900;letter-spacing:.14em;color:#2b6fa3}.hero h1{margin:0;font-size:clamp(34px,6vw,70px);letter-spacing:-.05em}.hero p{font-size:clamp(15px,2vw,21px);margin:12px 0 0;color:#5a4731}.bookshelf{height:calc(100dvh - 190px);overflow:auto;padding:28px clamp(18px,5vw,72px) 80px;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:24px;background:radial-gradient(circle at top,#fff9e9,#ead1a1)}.book{border:0;text-align:left;border-radius:28px;padding:0;background:#fff;box-shadow:0 22px 48px rgba(93,64,24,.2);cursor:pointer;overflow:hidden;transform:translateY(0);transition:.25s}.book:active{transform:scale(.98)}.book img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#ead1a1}.book-info{padding:18px 20px 22px}.book-info h2{margin:0 0 8px;font-size:25px}.book-info p{margin:0;color:#725b3c;line-height:1.55}.badge{display:inline-block;margin-bottom:10px;padding:6px 10px;border-radius:99px;background:#e9f5ff;color:#23658f;font-weight:900;font-size:12px}.reader-screen{background:#14100d;color:#fff}.reader-top{height:72px;padding:12px max(16px,env(safe-area-inset-left)) 10px;display:flex;align-items:center;justify-content:space-between;gap:16px;background:rgba(0,0,0,.38);position:relative;z-index:5}.reader-top strong{display:block;font-size:18px}.reader-top span{font-size:13px;color:#d7c5a8}.ghost-btn{border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.1);color:#fff;border-radius:999px;padding:10px 16px;font-weight:800}.book-stage{position:relative;height:calc(100dvh - 142px);display:flex;align-items:center;justify-content:center;padding:10px 12px 16px;perspective:1400px;background:radial-gradient(circle at 50% 30%,#312719,#120f0d 70%)}.page-card{position:relative;width:min(96vw,1180px);height:min(calc(100dvh - 170px),720px);border-radius:24px;overflow:hidden;background:#f7edda;box-shadow:0 35px 80px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.25);transition:transform .45s ease, opacity .25s ease}.page-card.flipping-next{transform:rotateY(-14deg) translateX(-20px);opacity:.55}.page-card.flipping-prev{transform:rotateY(14deg) translateX(20px);opacity:.55}.page-card img{width:100%;height:100%;object-fit:contain;background:#fbf0d9;display:block}.story-text{position:absolute;left:clamp(20px,5vw,68px);bottom:clamp(20px,5vw,56px);max-width:min(580px,78%);font-size:clamp(22px,4vw,48px);line-height:1.28;font-weight:900;letter-spacing:-.04em;color:#fff;text-shadow:0 3px 12px rgba(0,0,0,.72),0 1px 2px rgba(0,0,0,.9);white-space:pre-line}.tap-zone{position:absolute;top:0;bottom:0;width:35%;border:0;background:transparent;z-index:4}.tap-zone.left{left:0}.tap-zone.right{right:0}.reader-bottom{height:70px;display:flex;align-items:center;justify-content:center;gap:20px;background:rgba(0,0,0,.72);padding-bottom:env(safe-area-inset-bottom)}.reader-bottom button{border:0;border-radius:999px;background:#f4d38b;color:#2f2418;font-weight:900;padding:12px 24px}.dots{display:flex;gap:7px;max-width:40vw;flex-wrap:wrap;justify-content:center}.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.32)}.dot.active{background:#f4d38b;transform:scale(1.35)}@media (max-width:720px){.bookshelf{height:calc(100dvh - 170px);grid-template-columns:1fr}.reader-top{height:64px}.book-stage{height:calc(100dvh - 134px)}.page-card{width:96vw;height:calc(100dvh - 165px)}.story-text{font-size:clamp(20px,8vw,34px)}.reader-bottom{height:70px}.reader-bottom button{padding:11px 18px}}
  </style>
</head>
<body>
  <div id="app">
    <section id="library" class="screen active">
      <div class="hero">
        <p class="eyebrow">WOOJIN STORY LIBRARY</p>
        <h1>우진이 성장 도서관</h1>
        <p>우진이의 추억을 한 권씩 모아가는 전자 동화책이에요.</p>
      </div>
      <div class="bookshelf" id="bookshelf"></div>
    </section>
    <section id="reader" class="screen reader-screen" aria-hidden="true">
      <header class="reader-top">
        <button id="backToLibrary" class="ghost-btn">← 도서관으로</button>
        <div><strong id="readerTitle">책 제목</strong><span id="pageCounter">1 / 1</span></div>
      </header>
      <main class="book-stage">
        <button id="prevPage" class="tap-zone left" aria-label="이전 페이지"></button>
        <article id="pageCard" class="page-card">
          <img id="pageImage" src="" alt="동화책 페이지" />
          <div id="storyText" class="story-text"></div>
        </article>
        <button id="nextPage" class="tap-zone right" aria-label="다음 페이지"></button>
      </main>
      <footer class="reader-bottom"><button id="prevBtn">← 이전</button><div id="dots" class="dots"></div><button id="nextBtn">다음 →</button></footer>
    </section>
  </div>
<script>
const BOOKS=[{id:'train',title:'우진이의 기차 여행',subtitle:'사계절을 지나 바다와 터널을 지나요',badge:'🚂 읽을 수 있어요',cover:'assets/books/train/cover.jpg',pages:[{img:'assets/books/train/pages/01.jpg',text:'우진이의\n기차 여행이\n시작돼요.'},{img:'assets/books/train/pages/02.jpg',text:'봄바람이 살랑살랑.\n기차는 꽃길을 달려요.'},{img:'assets/books/train/pages/03.jpg',text:'파란 바다가 반짝반짝.\n우진이는 활짝 웃었어요.'},{img:'assets/books/train/pages/04.jpg',text:'가을 숲 사이로\n노란 잎이 춤을 춰요.'},{img:'assets/books/train/pages/05.jpg',text:'하얀 눈이 펑펑.\n겨울 마을에 도착했어요.'},{img:'assets/books/train/pages/06.jpg',text:'터널을 지나면\n또 새로운 여행이\n기다리고 있어요.'}]},{id:'jeju-part1',title:'우진이의 제주도 여행',subtitle:'Part 1 · 노란 꽃길과 파란 바다',badge:'🏝 읽을 수 있어요',cover:'assets/books/jeju-part1/cover.jpg',pages:[{img:'assets/books/jeju-part1/pages/01.jpg',text:'우진이의\n제주도 여행\nPart 1'},{img:'assets/books/jeju-part1/pages/02.jpg',text:'우진이네 가족은\n제주도에 도착했어요.'},{img:'assets/books/jeju-part1/pages/03.jpg',text:'노란 유채꽃 길을\n천천히 걸어보았어요.'},{img:'assets/books/jeju-part1/pages/04.jpg',text:'끝없이 펼쳐진 꽃밭에서\n우진이는 활짝 웃었어요.'},{img:'assets/books/jeju-part1/pages/05.jpg',text:'엄마랑 꼭 안고\n예쁜 사진도 찍었어요.'},{img:'assets/books/jeju-part1/pages/06.jpg',text:'아빠, 엄마, 우진이.\n함께라서 더 행복했어요.'},{img:'assets/books/jeju-part1/pages/07.jpg',text:'해녀 할머니를 만나\n신기한 이야기를 들었어요.'},{img:'assets/books/jeju-part1/pages/08.jpg',text:'파란 바다를 보며\n파도 소리를 들었어요.'},{img:'assets/books/jeju-part1/pages/09.jpg',text:'돌담 뒤에서\n까꿍!\n웃음이 터졌어요.'},{img:'assets/books/jeju-part1/pages/10.jpg',text:'스쿠터를 타고\n상상 여행도 떠났어요.'},{img:'assets/books/jeju-part1/pages/11.jpg',text:'하늘도 바다도 우리도\n모두 행복했던\n제주도 여행!'}]}];
const library=document.getElementById('library'),reader=document.getElementById('reader'),bookshelf=document.getElementById('bookshelf'),pageImage=document.getElementById('pageImage'),storyText=document.getElementById('storyText'),pageCard=document.getElementById('pageCard'),readerTitle=document.getElementById('readerTitle'),pageCounter=document.getElementById('pageCounter'),dots=document.getElementById('dots');let currentBook=null,pageIndex=0;
function formatStoryText(t){return String(t||'').replace(/\\n/g,'\n').replace(/\/n/g,'\n')}
function renderLibrary(){bookshelf.innerHTML=BOOKS.map(b=>`<button class="book" data-book="${b.id}"><img src="${b.cover}" alt="${b.title} 표지"><div class="book-info"><span class="badge">${b.badge}</span><h2>${b.title}</h2><p>${b.subtitle}</p></div></button>`).join('');document.querySelectorAll('.book').forEach(btn=>btn.addEventListener('click',()=>openBook(btn.dataset.book)))}
function openBook(id){currentBook=BOOKS.find(b=>b.id===id);if(!currentBook)return;pageIndex=0;library.classList.remove('active');reader.classList.add('active');reader.setAttribute('aria-hidden','false');renderPage()}
function renderPage(dir='next'){const p=currentBook.pages[pageIndex];pageCard.classList.add(dir==='prev'?'flipping-prev':'flipping-next');setTimeout(()=>{readerTitle.textContent=currentBook.title;pageCounter.textContent=`${pageIndex+1} / ${currentBook.pages.length}`;pageImage.src=p.img;storyText.textContent=formatStoryText(p.text);dots.innerHTML=currentBook.pages.map((_,i)=>`<span class="dot ${i===pageIndex?'active':''}"></span>`).join('');pageCard.classList.remove('flipping-next','flipping-prev')},120)}
function finishBook(){alert(`「${currentBook.title}」 이야기가 끝났어요!\n도서관으로 돌아갈게요.`);back()}
function nextPage(){if(!currentBook)return;if(pageIndex<currentBook.pages.length-1){pageIndex++;renderPage('next')}else finishBook()}
function prevPage(){if(currentBook&&pageIndex>0){pageIndex--;renderPage('prev')}}
function back(){reader.classList.remove('active');reader.setAttribute('aria-hidden','true');library.classList.add('active');currentBook=null;pageIndex=0;pageImage.removeAttribute('src');storyText.textContent=''}
document.getElementById('nextBtn').onclick=nextPage;document.getElementById('prevBtn').onclick=prevPage;document.getElementById('nextPage').onclick=nextPage;document.getElementById('prevPage').onclick=prevPage;document.getElementById('backToLibrary').onclick=back;window.addEventListener('keydown',e=>{if(reader.classList.contains('active')){if(e.key==='ArrowRight')nextPage();if(e.key==='ArrowLeft')prevPage();if(e.key==='Escape')back()}});let sx=0;window.addEventListener('touchstart',e=>{sx=e.touches[0].clientX},{passive:true});window.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(reader.classList.contains('active')&&Math.abs(dx)>50){dx<0?nextPage():prevPage()}},{passive:true});renderLibrary();
</script>
</body>
</html>
