<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WooJin Story Library</title>
  <link rel="stylesheet" href="css/main.css?v=20260709-4" />
</head>
<body>
  <div id="app">
    <section id="library" class="screen active">
      <div class="hero">
        <p class="eyebrow">WOОJIN STORY LIBRARY</p>
        <h1>우진이 성장 도서관</h1>
        <p>우진이의 추억을 한 권씩 모아가는 전자 동화책이에요.</p>
      </div>
      <div class="bookshelf" id="bookshelf"></div>
    </section>

    <section id="reader" class="screen reader-screen">
      <header class="reader-top">
        <button id="backToLibrary" class="ghost-btn">← 도서관으로</button>
        <div>
          <strong id="readerTitle">책 제목</strong>
          <span id="pageCounter">1 / 1</span>
        </div>
      </header>
      <main class="book-stage">
        <button id="prevPage" class="tap-zone left" aria-label="이전 페이지"></button>
        <article id="pageCard" class="page-card">
          <img id="pageImage" src="" alt="동화책 페이지" />
          <div id="storyText" class="story-text"></div>
        </article>
        <button id="nextPage" class="tap-zone right" aria-label="다음 페이지"></button>
      </main>
      <footer class="reader-bottom">
        <button id="prevBtn">← 이전</button>
        <div id="dots" class="dots"></div>
        <button id="nextBtn">다음 →</button>
      </footer>
    </section>
  </div>
  <script src="js/app.js?v=20260709-4"></script>
</body>
</html>
