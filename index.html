<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>우진이 성장 도서관</title>
<style>
:root{--bg1:#fff5d7;--bg2:#f4bf74;--ink:#3b2516;--card:#fffaf0;--accent:#f47b42;--green:#2f8f6b;--shadow:0 20px 50px rgba(75,43,12,.22)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;color:var(--ink);background:linear-gradient(160deg,#fff7df,#f7d596 45%,#f3b06a);overflow-x:hidden}button{font-family:inherit} .hidden{display:none!important}
.bg-clouds:before,.bg-clouds:after{content:"";position:fixed;inset:auto auto 10% -20%;width:65vw;height:20vw;max-height:180px;border-radius:999px;background:rgba(255,255,255,.28);filter:blur(6px);animation:cloud 34s linear infinite;pointer-events:none}.bg-clouds:after{top:7%;bottom:auto;left:45%;width:45vw;animation-duration:42s;opacity:.55}@keyframes cloud{to{transform:translateX(140vw)}}
.app{position:relative;min-height:100dvh;padding:24px max(16px,env(safe-area-inset-left)) max(24px,env(safe-area-inset-bottom));}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;max-width:1180px;margin:0 auto 18px}.brand h1{margin:0;font-size:clamp(28px,5vw,58px);line-height:1.05;letter-spacing:-.06em}.brand p{margin:8px 0 0;font-size:clamp(14px,2.3vw,18px);opacity:.8}.pill{border:0;border-radius:999px;background:rgba(255,255,255,.7);padding:10px 14px;box-shadow:0 8px 22px rgba(0,0,0,.1);font-weight:800;color:#5a3117}.stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.stat{background:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.55);border-radius:18px;padding:10px 14px;box-shadow:0 8px 22px rgba(0,0,0,.08);font-weight:900}.shelf{max-width:1180px;margin:0 auto;background:linear-gradient(#9c5b2d,#7a421e);border-radius:30px;padding:28px;box-shadow:var(--shadow), inset 0 -14px 0 rgba(0,0,0,.16)}.books{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:22px}.book-card{position:relative;min-height:300px;border:0;background:transparent;perspective:1000px;cursor:pointer;text-align:left}.book-cover{height:100%;min-height:300px;border-radius:18px;background:var(--card);box-shadow:0 18px 30px rgba(0,0,0,.24), inset 12px 0 16px rgba(0,0,0,.12);overflow:hidden;transition:transform .42s cubic-bezier(.2,.9,.2,1),box-shadow .42s;transform-origin:left center}.book-card:hover .book-cover,.book-card.opening .book-cover{transform:translateY(-14px) rotateY(-13deg) rotateZ(-1deg);box-shadow:0 34px 55px rgba(0,0,0,.30)}.book-cover img{width:100%;height:190px;object-fit:cover;display:block}.book-info{padding:16px 16px 18px}.book-info h2{margin:0 0 8px;font-size:25px;letter-spacing:-.05em}.book-info p{margin:0;font-size:14px;line-height:1.45;opacity:.76}.status{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.88);border-radius:999px;padding:7px 10px;font-weight:900;font-size:13px}.stamp{position:absolute;left:12px;top:12px;background:#ffef7c;color:#8a4b00;border:2px solid rgba(151,80,0,.25);border-radius:999px;padding:7px 10px;font-weight:1000;transform:rotate(-8deg);box-shadow:0 5px 12px rgba(0,0,0,.14)}.coming{filter:saturate(.5);opacity:.68}.coming .book-cover{background:#eee}.footer-note{max-width:1180px;margin:18px auto 0;text-align:center;font-weight:800;color:rgba(60,35,15,.75)}
.reader{position:fixed;inset:0;z-index:10;background:radial-gradient(circle at top,#fffbec,#f2c37c);display:flex;flex-direction:column;padding:calc(12px + env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));overflow:hidden}.reader-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 auto 10px;width:min(1260px,100%);z-index:3}.reader-title{font-weight:1000;font-size:clamp(18px,3vw,28px);letter-spacing:-.04em}.reader-actions{display:flex;gap:8px}.navbtn{border:0;border-radius:999px;padding:11px 15px;background:rgba(255,255,255,.75);font-weight:900;color:#4a2b16;box-shadow:0 8px 20px rgba(0,0,0,.12)}.book-stage{position:relative;flex:1;display:grid;place-items:center;width:min(1260px,100%);margin:0 auto;min-height:0}.page-card{position:relative;width:min(100%,calc((100dvh - 116px) * 1.55));height:min(calc(100dvh - 116px),calc(100vw / 1.55));border-radius:28px;overflow:hidden;background:#fff9e8;box-shadow:0 25px 70px rgba(63,35,12,.34);transform-style:preserve-3d;will-change:transform,opacity}.page-card.flip-next{animation:flipNext .48s ease both}.page-card.flip-prev{animation:flipPrev .48s ease both}@keyframes flipNext{0%{transform:perspective(1200px) rotateY(0);opacity:1}50%{transform:perspective(1200px) rotateY(-10deg) translateX(-18px);opacity:.72}100%{transform:perspective(1200px) rotateY(0);opacity:1}}@keyframes flipPrev{0%{transform:perspective(1200px) rotateY(0);opacity:1}50%{transform:perspective(1200px) rotateY(10deg) translateX(18px);opacity:.72}100%{transform:perspective(1200px) rotateY(0);opacity:1}}.page-card img{width:100%;height:100%;object-fit:contain;background:linear-gradient(135deg,#fff6da,#f6d499);display:block}.story-text{position:absolute;left:6%;bottom:6%;max-width:48%;font-family:"Apple SD Gothic Neo","Noto Serif KR",serif;font-size:clamp(19px,3.2vw,38px);font-weight:900;line-height:1.28;letter-spacing:-.045em;color:#fff;text-shadow:0 3px 8px rgba(0,0,0,.58),0 0 20px rgba(0,0,0,.3);white-space:pre-line}.page-indicator{display:flex;align-items:center;justify-content:center;gap:8px;margin:10px auto 0}.dot{width:9px;height:9px;border-radius:99px;background:rgba(90,51,20,.24)}.dot.active{width:28px;background:var(--accent)}.reader-bottom{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px}.bigbtn{border:0;border-radius:18px;padding:13px 24px;background:#3d2b1d;color:#fff;font-weight:1000;box-shadow:0 10px 24px rgba(0,0,0,.2)}.bigbtn.primary{background:linear-gradient(135deg,#ff7d42,#f04462)}.bigbtn:disabled{opacity:.4}.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}.particle{position:absolute;top:-40px;font-size:24px;animation:fall linear forwards;opacity:.8}@keyframes fall{to{transform:translateY(110dvh) rotate(260deg);opacity:.15}}.train-intro{position:fixed;inset:0;z-index:50;background:linear-gradient(#bfe8ff,#fff6d5);display:grid;place-items:center;overflow:hidden}.train-intro.hidden{display:none!important}.train-box{text-align:center}.train{font-size:88px;animation:trainMove 2.1s ease-in-out forwards}.smoke{font-size:34px;opacity:.75;animation:smoke 1.1s infinite}.train-box h2{font-size:clamp(28px,6vw,60px);margin:0;color:#314d74}@keyframes trainMove{0%{transform:translateX(-80vw)}70%{transform:translateX(0)}100%{transform:translateX(110vw)}}@keyframes smoke{50%{transform:translateY(-12px);opacity:.35}}
.modal{position:fixed;inset:0;z-index:80;background:rgba(44,25,13,.42);display:grid;place-items:center;padding:24px}.modal-card{background:#fff7dc;border-radius:28px;padding:28px;text-align:center;max-width:420px;box-shadow:var(--shadow)}.modal-card h2{margin:0 0 10px;font-size:34px}.modal-card p{margin:0 0 18px;font-weight:800}.modal-card button{border:0;border-radius:999px;padding:13px 22px;background:#2f8f6b;color:white;font-weight:1000}
@media(max-width:720px){.topbar{align-items:flex-start;flex-direction:column}.shelf{padding:18px;border-radius:22px}.books{grid-template-columns:1fr 1fr;gap:12px}.book-card{min-height:220px}.book-cover{min-height:220px}.book-cover img{height:125px}.book-info{padding:11px}.book-info h2{font-size:18px}.book-info p{font-size:12px}.reader-top{margin-bottom:6px}.page-card{width:100%;height:calc(100dvh - 150px);border-radius:18px}.story-text{max-width:72%;font-size:clamp(20px,7vw,32px)}.bigbtn{padding:12px 16px}.train{font-size:70px}}
</style>
</head>
<body class="bg-clouds">
<div id="library" class="app">
  <div class="topbar">
    <div class="brand"><h1>📚 우진이 성장 도서관</h1><p>아빠와 함께 만든 세상에 하나뿐인 디지털 동화책</p></div>
    <div class="stats"><div class="stat" id="readStat">읽은 책 0권</div><button class="pill" id="resetBtn">스탬프 초기화</button></div>
  </div>
  <section class="shelf"><div class="books" id="books"></div></section>
  <p class="footer-note">책을 누르면 앞으로 슥 나오고, 동화책이 열려요.</p>
</div>
<div id="reader" class="reader hidden">
  <div class="reader-top"><button class="navbtn" id="backBtn">← 도서관으로</button><div class="reader-title" id="readerTitle"></div><div class="reader-actions"><button class="navbtn" id="soundBtn">🔇 소리 OFF</button></div></div>
  <div class="book-stage"><div class="particles" id="particles"></div><div class="page-card" id="pageCard"><img id="pageImg" alt="동화 페이지"><div id="storyText" class="story-text"></div></div></div>
  <div class="page-indicator" id="dots"></div>
  <div class="reader-bottom"><button class="bigbtn" id="prevBtn">← 이전</button><button class="bigbtn primary" id="nextBtn">다음 →</button></div>
</div>
<div id="trainIntro" class="train-intro hidden"><div class="train-box"><div class="smoke">☁️ ☁️</div><div class="train">🚂</div><h2>칙칙폭폭, 여행을 시작해요!</h2></div></div>
<div id="finishModal" class="modal hidden"><div class="modal-card"><h2>🎉 이야기가 끝났어요!</h2><p id="finishText">도서관으로 돌아가요.</p><button id="finishBtn">도서관으로 가기</button></div></div>
<script>
const BOOKS=[
 {id:'train',emoji:'🚂',title:'우진이의 기차여행',subtitle:'봄, 여름, 가을, 겨울을 지나가는 첫 번째 여행',cover:'assets/books/train/cover.jpg',theme:'train',pages:[
  ['assets/books/train/pages/01.jpg','우진이의\n기차여행'],['assets/books/train/pages/02.jpg','봄바람이 살랑살랑\n꽃길을 지나가요.'],['assets/books/train/pages/03.jpg','파란 바다 옆으로\n기차가 달려요.'],['assets/books/train/pages/04.jpg','노란 가을잎이\n창밖에서 춤춰요.'],['assets/books/train/pages/05.jpg','하얀 눈마을에서\n따뜻하게 웃어요.'],['assets/books/train/pages/06.jpg','터널을 지나면\n새로운 여행이 기다려요.']]
 },
 {id:'jeju',emoji:'🏝️',title:'우진이의 제주도 여행',subtitle:'PART 1 · 노란 꽃길과 파란 바다',cover:'assets/books/jeju-part1/cover.jpg',theme:'jeju',pages:[
  ['assets/books/jeju-part1/pages/01.jpg','제주도에\n도착했어요.'],['assets/books/jeju-part1/pages/02.jpg','노란 꽃길을\n천천히 걸어요.'],['assets/books/jeju-part1/pages/03.jpg','꽃향기가\n살랑살랑 다가와요.'],['assets/books/jeju-part1/pages/04.jpg','엄마 품은\n언제나 따뜻해요.'],['assets/books/jeju-part1/pages/05.jpg','우리 가족이 함께라서\n더 행복했어요.'],['assets/books/jeju-part1/pages/06.jpg','우진이는 오늘\n꼬마 해녀가 되었어요.'],['assets/books/jeju-part1/pages/07.jpg','파도가 철썩철썩\n인사를 해요.'],['assets/books/jeju-part1/pages/08.jpg','바위 뒤에서\n까꿍!'],['assets/books/jeju-part1/pages/09.jpg','부릉부릉\n상상 여행을 떠나요.'],['assets/books/jeju-part1/pages/10.jpg','아빠가 번쩍!\n하늘 가까이 올라가요.'],['assets/books/jeju-part1/pages/11.jpg','오늘도\n행복한 하루였습니다.']]
 },
 {id:'jeju2',emoji:'🌊',title:'제주도 여행 Part 2',subtitle:'다음 사진으로 곧 이어질 바다 이야기',cover:'assets/books/jeju-part1/cover.jpg',coming:true},
 {id:'dino',emoji:'🦕',title:'공룡나라 모험',subtitle:'우진이가 공룡 친구를 만나는 이야기',cover:'assets/books/train/cover.jpg',coming:true}
];
let current=null,page=0,soundOn=false,audioCtx=null;
const $=id=>document.getElementById(id);const readKey='woojin.readBooks.v3';
function getRead(){try{return JSON.parse(localStorage.getItem(readKey)||'{}')}catch(e){return {}}}function setRead(v){localStorage.setItem(readKey,JSON.stringify(v))}
function renderLibrary(){const read=getRead();$('books').innerHTML=BOOKS.map(b=>`<button class="book-card ${b.coming?'coming':''}" data-id="${b.id}"><div class="book-cover"><img src="${b.cover}" alt="${b.title}"><div class="book-info"><h2>${b.emoji} ${b.title}</h2><p>${b.subtitle}</p></div></div>${read[b.id]?'<div class="stamp">✅ 완독</div>':''}<div class="status">${b.coming?'준비중':(read[b.id]?'다시 읽기':'읽기')}</div></button>`).join('');$('readStat').textContent=`읽은 책 ${Object.keys(read).length}권`;document.querySelectorAll('.book-card').forEach(btn=>btn.onclick=()=>openBook(btn.dataset.id,btn));}
function openBook(id,btn){const book=BOOKS.find(b=>b.id===id);if(!book||book.coming){alert('아직 준비중인 이야기예요.');return;}btn.classList.add('opening');setTimeout(()=>{current=book;page=0;$('readerTitle').textContent=`${book.emoji} ${book.title}`;$('library').classList.add('hidden');$('reader').classList.remove('hidden');if(book.theme==='train')showTrainIntro();showPage('next');startParticles(book.theme);},360)}
function showTrainIntro(){const el=$('trainIntro');el.classList.remove('hidden');beep('train');setTimeout(()=>el.classList.add('hidden'),2200)}
function showPage(dir){if(!current)return;const p=current.pages[page];const card=$('pageCard');card.classList.remove('flip-next','flip-prev');void card.offsetWidth;card.classList.add(dir==='prev'?'flip-prev':'flip-next');$('pageImg').src=p[0];$('storyText').textContent=p[1].replace(/\\n/g,'\n');$('prevBtn').disabled=page===0;$('nextBtn').textContent=page===current.pages.length-1?'끝내기 →':'다음 →';$('dots').innerHTML=current.pages.map((_,i)=>`<span class="dot ${i===page?'active':''}"></span>`).join('');beep('page')}
function next(){if(!current)return;if(page>=current.pages.length-1){finishBook();return;}page++;showPage('next')}function prev(){if(!current||page===0)return;page--;showPage('prev')}
function finishBook(){const read=getRead();read[current.id]={done:true,date:new Date().toISOString(),count:(read[current.id]?.count||0)+1};setRead(read);$('finishText').textContent=`${current.title} 완독 스탬프를 찍었어요.`;$('finishModal').classList.remove('hidden');beep('done')}
function closeReader(){current=null;$('reader').classList.add('hidden');$('library').classList.remove('hidden');$('finishModal').classList.add('hidden');renderLibrary()}
function startParticles(theme){const box=$('particles');box.innerHTML='';const icons=theme==='jeju'?['🌼','🦋','🌊','☁️']:['🌸','🍂','❄️','☁️'];let n=0;clearInterval(window.particleTimer);window.particleTimer=setInterval(()=>{if($('reader').classList.contains('hidden'))return;const s=document.createElement('span');s.className='particle';s.textContent=icons[Math.floor(Math.random()*icons.length)];s.style.left=Math.random()*100+'%';s.style.animationDuration=(5+Math.random()*6)+'s';s.style.fontSize=(18+Math.random()*18)+'px';box.appendChild(s);setTimeout(()=>s.remove(),11000);if(++n>120)box.firstChild?.remove();},520)}
function initAudio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}function beep(type){if(!soundOn)return;initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);const now=audioCtx.currentTime;if(type==='train'){o.frequency.setValueAtTime(190,now);o.frequency.linearRampToValueAtTime(120,now+.22);g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.35);o.start(now);o.stop(now+.36);setTimeout(()=>beep('page'),180);return}if(type==='done'){o.frequency.value=660;g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.5);o.start(now);o.stop(now+.5);return}o.frequency.value=360;g.gain.setValueAtTime(.045,now);g.gain.exponentialRampToValueAtTime(.001,now+.12);o.start(now);o.stop(now+.13)}
$('nextBtn').onclick=next;$('prevBtn').onclick=prev;$('backBtn').onclick=closeReader;$('finishBtn').onclick=closeReader;$('soundBtn').onclick=()=>{soundOn=!soundOn;if(soundOn)initAudio();$('soundBtn').textContent=soundOn?'🔊 소리 ON':'🔇 소리 OFF';beep('done')};$('resetBtn').onclick=()=>{if(confirm('완독 스탬프를 초기화할까요?')){localStorage.removeItem(readKey);renderLibrary()}};
let sx=0;$('reader').addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});$('reader').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>55){dx<0?next():prev()}},{passive:true});document.addEventListener('keydown',e=>{if(!$('reader').classList.contains('hidden')){if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key==='Escape')closeReader()}});
renderLibrary();
</script>
</body>
</html>
